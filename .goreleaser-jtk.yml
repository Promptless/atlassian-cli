version: 2

project_name: jtk

before:
  hooks:
    - go mod tidy -C tools/jtk
    - go test ./tools/jtk/...

# INT-450: darwin builds with CGO so 99designs/keyring's Keychain backend
# (//go:build darwin && cgo) is compiled in; without it credstore fails
# closed on macOS. linux/windows stay CGO-off static (their keyring
# backends are pure Go; cgo there would regress glibc portability).
# Split is by GOOS only — both darwin amd64 and arm64 are still produced.
builds:
  - id: jtk-darwin
    dir: tools/jtk
    main: ./cmd/jtk
    binary: jtk
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    overrides:
      - goos: darwin
        goarch: amd64
        goamd64: v1
        env:
          - CGO_ENABLED=1
          - "CC=xcrun clang -arch x86_64"
      - goos: darwin
        goarch: arm64
        goarm64: v8.0
        env:
          - CGO_ENABLED=1
          - "CC=xcrun clang -arch arm64"
    ldflags:
      - -s -w
      - -X github.com/open-cli-collective/atlassian-go/version.Version={{.Version}}
      - -X github.com/open-cli-collective/atlassian-go/version.Commit={{.Commit}}
      - -X github.com/open-cli-collective/atlassian-go/version.BuildDate={{.Date}}
  - id: jtk-unix-win
    dir: tools/jtk
    main: ./cmd/jtk
    binary: jtk
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/open-cli-collective/atlassian-go/version.Version={{.Version}}
      - -X github.com/open-cli-collective/atlassian-go/version.Commit={{.Commit}}
      - -X github.com/open-cli-collective/atlassian-go/version.BuildDate={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - tools/jtk/LICENSE
      - tools/jtk/README.md

# Linux packages (.deb and .rpm)
nfpms:
  - id: jtk
    # deb/rpm are linux-only: pull the static CGO-off build, never darwin.
    # `ids` (the v2 build-id filter) — `builds` is deprecated and fails
    # `goreleaser check`.
    ids:
      - jtk-unix-win
    package_name: jtk
    vendor: Open CLI Collective
    homepage: https://github.com/open-cli-collective/atlassian-cli
    maintainer: Open CLI Collective <https://github.com/open-cli-collective>
    description: Command-line interface for Jira Cloud
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: tools/jtk/LICENSE
        dst: /usr/share/licenses/jtk/LICENSE

# Canonical Homebrew cask with auto-quarantine removal for unsigned binaries.
# skip_upload: true → goreleaser RENDERS the canonical jtk cask into dist/ but
# does NOT push it; the reusable release workflow's homebrew-alias step is the
# single atomic writer that commits both the canonical jtk cask AND the
# jira-ticket-cli alias cask to the tap (the manifest's alias_casks — replacing
# the old sed in release-jtk.yml; GoReleaser Free has no alternative_names). No
# `token:` here — the tap token belongs only to that alias job. The url.template
# stays: goreleaser runs BEFORE the jtk-v* tag rename, so the download URL must
# pin the final prefixed tag or it 404s on the temp tag.
homebrew_casks:
  - name: jtk
    skip_upload: true
    url:
      template: "https://github.com/open-cli-collective/atlassian-cli/releases/download/jtk-v{{ .Version }}/{{ .ArtifactName }}"
    repository:
      owner: open-cli-collective
      name: homebrew-tap
    homepage: https://github.com/open-cli-collective/atlassian-cli
    description: "Command-line interface for Jira Cloud"
    binaries: [jtk]
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/jtk"]
    caveats: |
      jtk has been installed.

      To configure, run:
        jtk config set --domain DOMAIN --email EMAIL --token TOKEN

      Get your API token from: https://id.atlassian.com/manage-profile/security/api-tokens

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  use: git
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - '^Merge pull request'
  groups:
    - title: 'Features'
      regexp: '^feat:'
      order: 0
    - title: 'Bug Fixes'
      regexp: '^fix:'
      order: 1
    - title: 'Other'
      order: 999

release:
  # idempotent re-runs: a retried release overwrites the same assets instead of
  # erroring on "asset already exists" (release-preflight hard-requires this).
  replace_existing_artifacts: true
  github:
    owner: open-cli-collective
    name: atlassian-cli
