name: Release cfl

on:
  push:
    tags:
      - 'cfl-v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/cfl-v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: tools/cfl/go.sum

      - name: Create temporary semver tag for GoReleaser
        run: |
          git tag v${{ steps.get_version.outputs.version }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --config .goreleaser-cfl.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: v${{ steps.get_version.outputs.version }}

      - name: Fix release tag
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          gh release edit "v${VERSION}" --tag "cfl-v${VERSION}" --title "cfl v${VERSION}"
          git push origin :refs/tags/v${VERSION}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # chocolatey-publish-cfl.yml and winget-publish-cfl.yml are dispatched
  # automatically by the trigger-publish job below. They remain in separate
  # workflow files (workflow_dispatch only) so Microsoft-hosted service
  # flakiness in wingetcreate fork-sync or choco push does not gate the
  # binary/Homebrew artifacts.

  trigger-publish:
    needs: goreleaser
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      actions: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VERSION: ${{ needs.goreleaser.outputs.version }}
    steps:
      - name: Trigger Chocolatey publish
        continue-on-error: true
        run: gh workflow run chocolatey-publish-cfl.yml -f version="$VERSION" --ref main --repo "$GITHUB_REPOSITORY"
      - name: Trigger Winget publish
        continue-on-error: true
        run: gh workflow run winget-publish-cfl.yml -f version="$VERSION" --ref main --repo "$GITHUB_REPOSITORY"

  linux-packages:
    needs: goreleaser
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Trigger linux-packages repo update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.LINUX_PACKAGES_DISPATCH_TOKEN }}
          repository: open-cli-collective/linux-packages
          event-type: package-release
          client-payload: |-
            {
              "package": "cfl",
              "version": "${{ github.ref_name }}",
              "repo": "open-cli-collective/atlassian-cli"
            }
